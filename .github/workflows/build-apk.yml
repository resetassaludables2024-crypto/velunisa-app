name: Build Android APK

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run expo prebuild (generates native Android code)
        working-directory: apps/mobile
        run: npx expo prebuild --clean --platform android --no-install
        env:
          EXPO_ROUTER_APP_ROOT: ./app
          EXPO_ROUTER_IMPORT_MODE: sync

      - name: Generate signing keystore
        working-directory: apps/mobile
        run: |
          keytool -genkey -v \
            -keystore velunisa-release.keystore \
            -alias velunisa \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Velunisa, OU=Mobile, O=Velunisa, L=Quito, ST=Pichincha, C=EC" \
            -storepass velunisa2026 \
            -keypass velunisa2026

      - name: Build signed release APK
        working-directory: apps/mobile/android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/apps/mobile/velunisa-release.keystore \
            -Pandroid.injected.signing.store.password=velunisa2026 \
            -Pandroid.injected.signing.key.alias=velunisa \
            -Pandroid.injected.signing.key.password=velunisa2026
        env:
          JAVA_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.configuration-cache=false"

      - name: Rename APK
        run: |
          find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | head -1 | \
          xargs -I{} cp {} velunisa.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: velunisa-apk
          path: velunisa.apk
          retention-days: 30

      - name: Create/Update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "Velunisa App — Android APK"
          body: |
            ## Velunisa para Android

            Descarga e instala la app oficial de Velunisa en tu dispositivo Android.

            ### Instalación
            1. Descarga el archivo `velunisa.apk`
            2. En tu teléfono: Ajustes → Seguridad → Activar "Fuentes desconocidas"
            3. Abre el archivo descargado y sigue el asistente
            4. ¡Listo! La app aparecerá en tu pantalla de inicio

            ### Versión
            - Versión: 1.0.0
            - SDK mínimo: Android 6.0 (API 23)
            - Arquitecturas: arm64-v8a, armeabi-v7a
            - Generado: ${{ github.sha }}
          files: velunisa.apk
          prerelease: false
          make_latest: true
