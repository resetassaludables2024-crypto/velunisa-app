/**
 * Find @react-native/gradle-plugin directory.
 * Tries Node.js resolution first, then falls back to relative paths
 * for pnpm monorepo environments (EAS Build).
 */
def findRNGradlePlugin(File rootDir) {
  // Try Node.js resolution (works when package is directly accessible)
  try {
    def nodeOutput = ["node", "--print",
      "try{require.resolve('@react-native/gradle-plugin/package.json')}catch(e){''}"
    ].execute(null, rootDir).text.trim()
    if (nodeOutput && nodeOutput.endsWith("package.json") && new File(nodeOutput).exists()) {
      return new File(nodeOutput).parentFile
    }
  } catch (Exception ignored) {}

  // Fallback: search relative paths for pnpm monorepo setups
  // rootDir = apps/mobile/android/
  def candidates = [
    new File(rootDir, "../../node_modules/@react-native/gradle-plugin"),      // apps/mobile/node_modules
    new File(rootDir, "../../../../node_modules/@react-native/gradle-plugin"), // monorepo root node_modules
  ]
  for (candidate in candidates) {
    if (candidate.exists() && new File(candidate, "package.json").exists()) {
      println("[settings.gradle] Found @react-native/gradle-plugin at: ${candidate.canonicalPath}")
      return candidate.canonicalFile
    }
  }

  println("[settings.gradle] WARNING: @react-native/gradle-plugin not found, using react-settings-plugin stub")
  return null
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

